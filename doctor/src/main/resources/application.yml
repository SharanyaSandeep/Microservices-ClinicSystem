server:
  port: 8081

spring:
  application:
    name: DOCTOR-SERVICE
  datasource:
    url: jdbc:h2:mem:doctor_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# CORS configuration for frontend
management:
  endpoints:
    web:
      exposure:
        include: "*"
