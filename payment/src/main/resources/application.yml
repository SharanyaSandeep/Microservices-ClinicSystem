server:
  port: 8083

spring:
  application:
    name: PAYMENT-SERVICE
  datasource:
    url: jdbc:h2:mem:payment_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
