<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Management</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <h2>Clinic Admin</h2>
      <nav>
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="doctors.html" class="nav-item">Doctors</a>
        <a href="patients.html" class="nav-item">Patients</a>
        <a href="payments.html" class="nav-item active">Payments</a>
      </nav>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h1>Payment Management</h1>
          <p>Process payments and track clinic revenue</p>
        </div>
        <button id="btn-logout" class="btn">Logout</button>
      </header>

      <!-- Process Payment Form -->
      <section class="card">
        <h2>Process New Payment</h2>
        <form id="payment-form" class="form-grid">
          <div class="form-group">
            <label for="payment-patient">Patient</label>
            <select id="payment-patient" required>
              <option value="">Select patient</option>
            </select>
          </div>

          <div class="form-group">
            <label for="payment-doctor">Doctor</label>
            <select id="payment-doctor" required>
              <option value="">Select doctor</option>
            </select>
          </div>

          <div class="form-group">
            <label for="payment-amount">Amount (₹)</label>
            <input type="number" id="payment-amount" min="0" step="0.01" required />
          </div>

          <div class="form-group">
            <label for="payment-service">Service</label>
            <select id="payment-service" required>
              <option value="">Select service</option>
              <option value="Consultation">Consultation</option>
              <option value="Follow-up">Follow-up</option>
              <option value="Medication">Medication</option>
              <option value="Lab Test">Lab Test</option>
              <option value="Procedure">Procedure</option>
            </select>
          </div>

          <div class="form-group full-width">
            <button type="submit" class="btn btn-primary">Process Payment</button>
          </div>
        </form>
        <p id="payment-form-error" class="error-text"></p>
      </section>

      <!-- Payments List -->
      <section class="card" style="margin-top: 24px;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2>Payment History</h2>
          <div>
            <select id="payment-status-filter" style="margin-right: 10px;">
              <option value="">All Status</option>
              <option value="completed">Completed</option>
              <option value="pending">Pending</option>
              <option value="failed">Failed</option>
            </select>
            <input type="date" id="payment-date-filter" style="max-width: 150px;" />
          </div>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Amount</th>
              <th>Service</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="payments-table-body">
            <tr><td colspan="8">Loading payments...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/payments.js"></script>
</body>
</html>
